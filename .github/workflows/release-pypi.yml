name: Release to PyPI

# Triggered when a `v*` tag is pushed. Builds sdist + wheel, then publishes
# to PyPI using Trusted Publishing via OIDC — no API token required.
#
# ONE-TIME SETUP REQUIRED on pypi.org:
#   1. Project owner: log in to https://pypi.org/manage/account/publishing/
#   2. Add a new "pending publisher" with:
#        PyPI Project Name: onyx2moodle
#        Owner:             patrickmelix
#        Repository name:   onyx2moodle
#        Workflow name:     release-pypi.yml
#        Environment name:  pypi
#   3. Once the first release is published, the publisher becomes permanent.
#   4. Create a GitHub environment named `pypi` (Settings → Environments →
#      New environment) and optionally add a required reviewer for extra
#      safety — that way each release requires a human click to proceed.
#
# To cut a release:
#   1. Bump `version` in pyproject.toml.
#   2. git commit -am "Release vX.Y.Z"
#   3. git tag vX.Y.Z && git push --tags
#   4. The tag triggers this workflow; pypi-publish handles the upload.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PROJ_VER=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "Tag version: $TAG"
          echo "pyproject version: $PROJ_VER"
          if [ "$TAG" != "$PROJ_VER" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject.toml version $PROJ_VER"
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Check built distributions
        run: |
          python -m pip install twine
          python -m twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/onyx2moodle/
    permissions:
      id-token: write  # required for trusted publishing via OIDC

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
